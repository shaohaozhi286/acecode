name: package

on:
  workflow_dispatch:
    inputs:
      npm_version:
        description: npm version to backfill after a full package build (must match CMakeLists.txt)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-web-ui:
    name: web-dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        shell: bash
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload web UI
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  build-and-package:
    name: ${{ matrix.id }}
    needs: build-web-ui
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_BINARY_SOURCES: clear;default,readwrite
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-22.04
            triplet: x64-linux
            executable: acecode
            archive_extension: tar.gz
            build_desktop: true
            cmake_extra_args: -DACECODE_BUILD_DESKTOP=ON
          - id: linux-arm64
            os: ubuntu-22.04-arm
            triplet: arm64-linux
            executable: acecode
            archive_extension: tar.gz
            build_desktop: true
            cmake_extra_args: -DACECODE_BUILD_DESKTOP=ON
          - id: windows-x64
            os: windows-2022
            triplet: x64-windows-static
            executable: acecode.exe
            archive_extension: zip
            msvc_arch: amd64
            build_desktop: true
            cmake_extra_args: -DACECODE_BUILD_DESKTOP=ON
          - id: windows-arm64
            os: windows-2022
            triplet: arm64-windows-static
            executable: acecode.exe
            archive_extension: zip
            msvc_arch: amd64_arm64
            build_desktop: true
            cmake_extra_args: -DACECODE_BUILD_DESKTOP=ON
          - id: macos-x64
            os: macos-15
            triplet: x64-osx
            executable: acecode
            archive_extension: tar.gz
            build_desktop: true
            cmake_extra_args: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DACECODE_BUILD_DESKTOP=ON
          - id: macos-arm64
            os: macos-15
            triplet: arm64-osx
            executable: acecode
            archive_extension: tar.gz
            build_desktop: true
            cmake_extra_args: -DACECODE_BUILD_DESKTOP=ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-v2-${{ matrix.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            vcpkg-v2-${{ matrix.os }}-${{ matrix.triplet }}-

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux' && matrix.build_desktop
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
            -DBUILD_TESTING=OFF \
            ${{ matrix.cmake_extra_args }}

      - name: Build
        shell: bash
        run: cmake --build build --config MinSizeRel --target acecode

      - name: Build desktop
        if: matrix.build_desktop
        shell: bash
        run: cmake --build build --config MinSizeRel --target acecode-desktop

      - name: Build browser host
        shell: bash
        run: cmake --build build --config MinSizeRel --target ace-browser-host

      - name: Extract debug symbols (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          objcopy --only-keep-debug "build/${{ matrix.executable }}" "build/${{ matrix.executable }}.debug"
          strip --strip-unneeded "build/${{ matrix.executable }}"
          objcopy --add-gnu-debuglink="build/${{ matrix.executable }}.debug" "build/${{ matrix.executable }}"

      - name: Extract desktop debug symbols (Linux)
        if: runner.os == 'Linux' && matrix.build_desktop
        shell: bash
        run: |
          objcopy --only-keep-debug "build/acecode-desktop" "build/acecode-desktop.debug"
          strip --strip-unneeded "build/acecode-desktop"
          objcopy --add-gnu-debuglink="build/acecode-desktop.debug" "build/acecode-desktop"

      - name: Extract debug symbols (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dsymutil "build/${{ matrix.executable }}" -o "build/${{ matrix.executable }}.dSYM"
          strip "build/${{ matrix.executable }}"

      - name: Extract desktop debug symbols (macOS)
        if: runner.os == 'macOS' && matrix.build_desktop
        shell: bash
        run: |
          app_exec="build/ACECode.app/Contents/MacOS/ACECode"
          app_daemon="build/ACECode.app/Contents/MacOS/acecode-daemon"
          if [ ! -f "$app_exec" ]; then
            echo "Missing desktop app executable: $app_exec" >&2
            exit 1
          fi
          if [ ! -f "$app_daemon" ]; then
            echo "Missing desktop app daemon: $app_daemon" >&2
            exit 1
          fi
          dsymutil "$app_exec" -o "build/ACECode.app.dSYM"
          strip "$app_exec"
          dsymutil "$app_daemon" -o "build/acecode-daemon.dSYM"
          strip "$app_daemon"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          package_dir="dist/acecode-${{ matrix.id }}"
          mkdir -p "$package_dir"

          if [ ! -f "build/${{ matrix.executable }}" ]; then
            echo "Missing terminal executable: build/${{ matrix.executable }}" >&2
            exit 1
          fi
          cp "build/${{ matrix.executable }}" "$package_dir/"
          cp README.md README_CN.md "$package_dir/"

          browser_host=""
          for candidate in \
            "build/ace-browser-host" \
            "build/Release/ace-browser-host" \
            "build/RelWithDebInfo/ace-browser-host" \
            "build/MinSizeRel/ace-browser-host" \
            "build/Debug/ace-browser-host"; do
            if [ -f "$candidate" ]; then
              browser_host="$candidate"
              break
            fi
          done
          if [ -z "$browser_host" ]; then
            echo "Missing browser host executable: ace-browser-host" >&2
            find build -type f -name 'ace-browser-host*' -print >&2 || true
            exit 1
          fi
          cp "$browser_host" "$package_dir/"

          if [ "${{ matrix.build_desktop }}" = "true" ]; then
            if [ "$RUNNER_OS" = "macOS" ]; then
              if [ ! -d "build/ACECode.app" ]; then
                echo "Missing desktop app bundle: build/ACECode.app" >&2
                exit 1
              fi
              cp -r "build/ACECode.app" "$package_dir/"
            else
              if [ ! -f "build/acecode-desktop" ]; then
                echo "Missing desktop executable: build/acecode-desktop" >&2
                exit 1
              fi
              cp "build/acecode-desktop" "$package_dir/"
              cp "web/dist/acecode-logo.png" "$package_dir/"
            fi
          fi
          tar -C dist -czf "acecode-${{ matrix.id }}.tar.gz" "acecode-${{ matrix.id }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "dist/acecode-${{ matrix.id }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $terminalExe = "build/${{ matrix.executable }}"
          if (-not (Test-Path -LiteralPath $terminalExe)) {
            throw "Missing terminal executable: $terminalExe"
          }
          Copy-Item -LiteralPath $terminalExe -Destination "$packageDir/"
          Copy-Item "README.md","README_CN.md" "$packageDir/"

          $browserHostCandidates = @(
            "build/ace-browser-host.exe",
            "build/Release/ace-browser-host.exe",
            "build/Debug/ace-browser-host.exe",
            "build/RelWithDebInfo/ace-browser-host.exe",
            "build/MinSizeRel/ace-browser-host.exe"
          )
          $browserHostExe = $browserHostCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $browserHostExe) {
            $browserHostExe = Get-ChildItem -Path "build" -Recurse -Filter "ace-browser-host.exe" -File |
              Select-Object -ExpandProperty FullName -First 1
          }
          if (-not $browserHostExe) {
            throw "Missing browser host executable: ace-browser-host.exe"
          }
          Copy-Item -LiteralPath $browserHostExe -Destination "$packageDir/"

          if ("${{ matrix.build_desktop }}" -eq "true") {
            $desktopCandidates = @(
              "build/acecode-desktop.exe",
              "build/Release/acecode-desktop.exe",
              "build/Debug/acecode-desktop.exe",
              "build/RelWithDebInfo/acecode-desktop.exe",
              "build/MinSizeRel/acecode-desktop.exe"
            )
            $desktopExe = $desktopCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
            if (-not $desktopExe) {
              $desktopExe = Get-ChildItem -Path "build" -Recurse -Filter "acecode-desktop.exe" -File |
                Select-Object -ExpandProperty FullName -First 1
            }
            if (-not $desktopExe) {
              throw "Missing desktop executable: acecode-desktop.exe"
            }
            Copy-Item -LiteralPath $desktopExe -Destination "$packageDir/"
          }
          Compress-Archive -Path "$packageDir/*" -DestinationPath "acecode-${{ matrix.id }}.zip" -Force

      - name: Verify Windows ARM64 package
        if: matrix.id == 'windows-arm64'
        shell: pwsh
        run: |
          $packageDir = "dist/acecode-${{ matrix.id }}"
          $expectedExecutables = @(
            "acecode.exe",
            "acecode-desktop.exe",
            "ace-browser-host.exe"
          )
          foreach ($name in $expectedExecutables) {
            $path = Join-Path $packageDir $name
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing ARM64 package executable: $path"
            }
            $headers = (& dumpbin /headers $path | Out-String)
            if ($LASTEXITCODE -ne 0 -or $headers -notmatch '(?im)\bAA64 machine\b') {
              throw "$name is not an ARM64 PE executable"
            }
            Write-Host "${name}: ARM64"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}
          path: acecode-${{ matrix.id }}.${{ matrix.archive_extension }}
          if-no-files-found: error

      - name: Upload PDB
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-pdb
          path: build/**/acecode.pdb
          if-no-files-found: warn

      - name: Upload desktop PDB
        if: runner.os == 'Windows' && matrix.build_desktop
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-desktop-pdb
          path: build/**/acecode-desktop.pdb
          if-no-files-found: warn

      - name: Upload debug symbols (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-debug
          path: build/${{ matrix.executable }}.debug
          if-no-files-found: warn

      - name: Upload desktop debug symbols (Linux)
        if: runner.os == 'Linux' && matrix.build_desktop
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-desktop-debug
          path: build/acecode-desktop.debug
          if-no-files-found: warn

      - name: Upload dSYM (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-dsym
          path: build/${{ matrix.executable }}.dSYM
          if-no-files-found: warn

      - name: Upload desktop dSYM (macOS)
        if: runner.os == 'macOS' && matrix.build_desktop
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-desktop-dsym
          path: |
            build/ACECode.app.dSYM
            build/acecode-daemon.dSYM
          if-no-files-found: warn

  build-linux-old-package:
    name: ${{ matrix.id }}
    needs: build-web-ui
    runs-on: ${{ matrix.os }}
    container:
      image: buildpack-deps:buster
    env:
      DEBIAN_FRONTEND: noninteractive
      VCPKG_BINARY_SOURCES: clear;default,readwrite
      VCPKG_FORCE_SYSTEM_BINARIES: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-old-x64
            os: ubuntu-22.04
            triplet: x64-linux
            executable: acecode
            archive_extension: tar.gz
          - id: linux-old-arm64
            os: ubuntu-22.04-arm
            triplet: arm64-linux
            executable: acecode
            archive_extension: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install old Linux dependencies
        shell: bash
        run: |
          sed -i \
            -e 's|http://deb.debian.org/debian|http://archive.debian.org/debian|g' \
            -e 's|http://security.debian.org/debian-security|http://archive.debian.org/debian-security|g' \
            -e 's|http://deb.debian.org/debian-security|http://archive.debian.org/debian-security|g' \
            /etc/apt/sources.list
          printf 'Acquire::Check-Valid-Until "false";\n' > /etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update
          apt-get install -y --no-install-recommends \
            binutils \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            ninja-build \
            perl \
            pkg-config \
            python3 \
            python3-pip \
            tar \
            unzip \
            zip
          rm -rf /var/lib/apt/lists/*

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.29.x'

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-v2-buster-${{ matrix.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            vcpkg-v2-buster-${{ matrix.os }}-${{ matrix.triplet }}-

      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
            -DBUILD_TESTING=OFF \
            -DACECODE_BUILD_DESKTOP=ON \
            -DWEBVIEW_WEBKITGTK_API=4.0

      - name: Build
        shell: bash
        run: cmake --build build --config MinSizeRel --target acecode

      - name: Build desktop
        shell: bash
        run: cmake --build build --config MinSizeRel --target acecode-desktop

      - name: Build browser host
        shell: bash
        run: cmake --build build --config MinSizeRel --target ace-browser-host

      - name: Verify old Linux ABI
        shell: bash
        run: |
          browser_host=""
          for candidate in \
            "build/ace-browser-host" \
            "build/Release/ace-browser-host" \
            "build/RelWithDebInfo/ace-browser-host" \
            "build/MinSizeRel/ace-browser-host" \
            "build/Debug/ace-browser-host"; do
            if [ -f "$candidate" ]; then
              browser_host="$candidate"
              break
            fi
          done
          if [ -z "$browser_host" ]; then
            echo "Missing browser host executable: ace-browser-host" >&2
            find build -type f -name 'ace-browser-host*' -print >&2 || true
            exit 1
          fi

          max_glibc="$(
            strings build/acecode build/acecode-desktop "$browser_host" |
              grep -Eo 'GLIBC_[0-9]+\.[0-9]+' |
              sed 's/GLIBC_//' |
              sort -Vu |
              tail -n1
          )"
          if [ -z "$max_glibc" ]; then
            echo "No GLIBC symbol versions found" >&2
            exit 1
          fi
          echo "Max GLIBC symbol: GLIBC_$max_glibc"
          if [ "$(printf '%s\n%s\n' "$max_glibc" "2.28" | sort -V | tail -n1)" != "2.28" ]; then
            echo "Old Linux package requires GLIBC_$max_glibc, expected <= GLIBC_2.28" >&2
            exit 1
          fi

          ldd build/acecode-desktop | tee build/acecode-desktop.ldd
          grep -E 'libwebkit2gtk-4\.0\.so\.37' build/acecode-desktop.ldd
          if grep -E 'libwebkit2gtk-4\.1|libwebkitgtk-6' build/acecode-desktop.ldd; then
            echo "Old Linux desktop linked against a newer WebKitGTK ABI" >&2
            exit 1
          fi

      - name: Extract debug symbols
        shell: bash
        run: |
          objcopy --only-keep-debug "build/${{ matrix.executable }}" "build/${{ matrix.executable }}.debug"
          strip --strip-unneeded "build/${{ matrix.executable }}"
          objcopy --add-gnu-debuglink="build/${{ matrix.executable }}.debug" "build/${{ matrix.executable }}"

          objcopy --only-keep-debug "build/acecode-desktop" "build/acecode-desktop.debug"
          strip --strip-unneeded "build/acecode-desktop"
          objcopy --add-gnu-debuglink="build/acecode-desktop.debug" "build/acecode-desktop"

      - name: Package
        shell: bash
        run: |
          package_dir="dist/acecode-${{ matrix.id }}"
          mkdir -p "$package_dir"

          if [ ! -f "build/${{ matrix.executable }}" ]; then
            echo "Missing terminal executable: build/${{ matrix.executable }}" >&2
            exit 1
          fi
          cp "build/${{ matrix.executable }}" "$package_dir/"
          cp README.md README_CN.md "$package_dir/"

          browser_host=""
          for candidate in \
            "build/ace-browser-host" \
            "build/Release/ace-browser-host" \
            "build/RelWithDebInfo/ace-browser-host" \
            "build/MinSizeRel/ace-browser-host" \
            "build/Debug/ace-browser-host"; do
            if [ -f "$candidate" ]; then
              browser_host="$candidate"
              break
            fi
          done
          if [ -z "$browser_host" ]; then
            echo "Missing browser host executable: ace-browser-host" >&2
            find build -type f -name 'ace-browser-host*' -print >&2 || true
            exit 1
          fi
          cp "$browser_host" "$package_dir/"

          if [ ! -f "build/acecode-desktop" ]; then
            echo "Missing desktop executable: build/acecode-desktop" >&2
            exit 1
          fi
          cp "build/acecode-desktop" "$package_dir/"
          cp "web/dist/acecode-logo.png" "$package_dir/"

          tar -C dist -czf "acecode-${{ matrix.id }}.tar.gz" "acecode-${{ matrix.id }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}
          path: acecode-${{ matrix.id }}.${{ matrix.archive_extension }}
          if-no-files-found: error

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-debug
          path: build/${{ matrix.executable }}.debug
          if-no-files-found: warn

      - name: Upload desktop debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: acecode-${{ matrix.id }}-desktop-debug
          path: build/acecode-desktop.debug
          if-no-files-found: warn

  package-browser-extension:
    name: ace-browser-bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Chrome extension
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED

          root = Path("ace-browser-bridge")
          required = [
              root / "manifest.json",
              root / "service_worker.js",
              root / "content" / "virtual-cursor.js",
          ]
          missing = [str(path) for path in required if not path.is_file()]
          if missing:
              raise SystemExit("Missing Chrome extension files: " + ", ".join(missing))

          out = Path("ace-browser-bridge.zip")
          if out.exists():
              out.unlink()
          with ZipFile(out, "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.as_posix())

          with ZipFile(out) as archive:
              names = set(archive.namelist())
          for path in required:
              entry = path.as_posix()
              if entry not in names:
                  raise SystemExit(f"Chrome extension zip missing {entry}")
          PY

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-browser-bridge
          path: ace-browser-bridge.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-package
      - build-linux-old-package
      - package-browser-extension
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets

          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 |
            while IFS= read -r -d '' file; do
              cp "$file" "release-assets/$(basename "$file")"
            done

          find artifacts -type f \( -name '*.pdb' -o -name '*.debug' \) -print0 |
            while IFS= read -r -d '' file; do
              relative="${file#artifacts/}"
              artifact_name="${relative%%/*}"
              cp "$file" "release-assets/[dev_only]${artifact_name}-$(basename "$file")"
            done

          # Package dSYM directories as tar.gz
          find artifacts -type d -name '*.dSYM' -print0 |
            while IFS= read -r -d '' dsym; do
              relative="${dsym#artifacts/}"
              artifact_name="${relative%%/*}"
              dsym_name="$(basename "$dsym")"
              tar -czf "release-assets/[dev_only]${artifact_name}-${dsym_name}.tar.gz" -C "$(dirname "$dsym")" "$dsym_name"
            done

          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: release-assets/*

  publish-npm:
    name: publish npm
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.npm_version != '')
    needs:
      - build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve npm version
        id: npm-version
        shell: bash
        env:
          INPUT_NPM_VERSION: ${{ inputs.npm_version }}
        run: |
          declared_version="$(awk '$1 == "project(acecode" && $2 == "VERSION" { print $3; exit }' CMakeLists.txt)"
          if [ -z "$declared_version" ]; then
            echo "::error::无法从 CMakeLists.txt 读取 ACECode 版本"
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$INPUT_NPM_VERSION"
            if [ "$version" != "$declared_version" ]; then
              echo "::error::手动 npm 版本 $version 与 CMakeLists.txt 版本 $declared_version 不一致"
              exit 1
            fi
          fi

          if [ -z "$version" ]; then
            echo "::error::npm 版本不能为空"
            exit 1
          fi

          dist_tag=latest
          case "$version" in *-*) dist_tag=next ;; esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: acecode-*
          merge-multiple: false

      - name: Extract archives
        shell: bash
        run: |
          mkdir -p extracted
          for id in linux-x64 linux-arm64 macos-x64 macos-arm64; do
            tar -xzf "artifacts/acecode-$id/acecode-$id.tar.gz" -C extracted
          done
          # Windows zip 打包时没有顶层目录(Compress-Archive $dir/*),解到显式目录
          for id in windows-x64 windows-arm64; do
            mkdir -p "extracted/acecode-$id"
            unzip -q "artifacts/acecode-$id/acecode-$id.zip" -d "extracted/acecode-$id"
          done

      - name: Prepare npm packages
        shell: bash
        run: |
          node scripts/npm/prepare-npm-packages.mjs \
            --version "${{ steps.npm-version.outputs.version }}" \
            --input extracted \
            --output npm-staging

      - name: Publish to npm
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_VERSION: ${{ steps.npm-version.outputs.version }}
          NPM_DIST_TAG: ${{ steps.npm-version.outputs.dist_tag }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret 未配置,无法发布 npm 包"
            exit 1
          fi
          # 顺序:先平台二进制包,再 cli / desktop 主包,主包才引用得到平台包
          for dir in npm-staging/platform/*/ npm-staging/cli npm-staging/desktop; do
            name="$(node -p "require('./$dir/package.json').name")"
            if npm view "$name@$NPM_VERSION" version >/dev/null 2>&1; then
              echo "skip $name@$NPM_VERSION (already published)"
              continue
            fi
            echo "publishing $name@$NPM_VERSION (dist-tag: $NPM_DIST_TAG)"
            (cd "$dir" && npm publish --access public --tag "$NPM_DIST_TAG")
          done
