name: test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    name: unit-tests (linux-x64)
    runs-on: ubuntu-22.04
    env:
      VCPKG_BINARY_SOURCES: clear;default,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-v2-test-ubuntu-22.04-x64-linux-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ports/**') }}
          restore-keys: |
            vcpkg-v2-test-ubuntu-22.04-x64-linux-

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DVCPKG_MANIFEST_FEATURES=tests \
            -DBUILD_TESTING=ON

      - name: Build test binary
        shell: bash
        run: cmake --build build --target acecode_unit_tests

      - name: Run ctest
        shell: bash
        run: ctest --test-dir build --output-on-failure
